# After creating the environment, set these before building giggle:
#   export HTS_INC=$CONDA_PREFIX/include
#   export HTS_LIB=$CONDA_PREFIX/lib
#   cd giggle && make
name: polymerization
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Build tools
  - gcc
  - make
  - autoconf
  - automake
  - libtool
  - binutils

  # Libraries
  - zlib
  - bzip2
  - xz
  - curl
  - openssl>=1.1
  - htslib>=1.19

  # Testing/utilities
  - bedtools
  - ruby

  # python
  - python>=3.10
  - pip
  - pytest
  - pandas
  - numpy
  - numba
  - matplotlib
  - ipython
  - duckdb
  - scikit-learn
  - pysam

  - quarto
